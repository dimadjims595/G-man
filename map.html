<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта боевых действий | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .map-viewport { cursor: grab; overflow: hidden; position: relative; background: #0f172a; touch-action: none; }
        .map-viewport:active { cursor: grabbing; }
        #mapImage { 
            position: absolute;
            user-select: none;
            -webkit-user-drag: none;
            transition: transform 0.1s ease-out;
            transform-origin: 0 0;
        }
        .nav-btn-group button {
            @apply w-12 h-12 bg-white/90 backdrop-blur-sm rounded-xl shadow-lg flex items-center justify-center hover:bg-[#f1c40f] active:scale-95 transition-all text-[#002868];
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <!-- Навигация -->
    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="shield" class="text-[#f1c40f]"></i>
                <span class="font-black text-xl uppercase tracking-tighter">State Portal</span>
            </div>
            <div class="hidden lg:flex items-center space-x-2">
                <a href="index.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Главная</a>
                <a href="news.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Новости</a>
                <a href="registration.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Регистрация</a>
                <a href="citizens.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Граждане</a>
                <a href="business.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Бизнесы</a>
                <a href="map.html" class="bg-white/10 text-[#f1c40f] px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Карта</a>
                <a href="donate.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Пожертвования</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 flex-grow w-full space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <h2 class="text-3xl font-black text-[#002868] uppercase tracking-tighter">Карта боевых действий</h2>
                <p class="text-slate-500 text-sm">Оперативная обстановка San Andreas.</p>
            </div>
            <div class="flex items-center gap-3 bg-white p-2 rounded-2xl border border-slate-200 shadow-sm">
                <button id="prevBtn" class="p-2 hover:bg-slate-100 rounded-xl transition-colors"><i data-lucide="chevron-left"></i></button>
                <div id="currentDate" class="text-xs font-bold text-[#002868] uppercase tracking-widest min-w-[120px] text-center">Загрузка...</div>
                <button id="nextBtn" class="p-2 hover:bg-slate-100 rounded-xl transition-colors"><i data-lucide="chevron-right"></i></button>
            </div>
        </div>

        <!-- Окно карты -->
        <div class="relative rounded-[2rem] shadow-2xl border-4 border-white h-[600px] md:h-[700px] map-viewport" id="mapViewport">
            <img id="mapImage" src="" referrerpolicy="no-referrer" alt="Карта" style="left: 0; top: 0;">
            
            <!-- Кнопки перемещения (D-Pad) -->
            <div class="absolute bottom-6 left-6 flex flex-col items-center gap-2 z-20 nav-btn-group">
                <button id="moveUp"><i data-lucide="chevron-up"></i></button>
                <div class="flex gap-2">
                    <button id="moveLeft"><i data-lucide="chevron-left"></i></button>
                    <button id="moveDown"><i data-lucide="chevron-down"></i></button>
                    <button id="moveRight"><i data-lucide="chevron-right"></i></button>
                </div>
            </div>

            <!-- Управление зумом -->
            <div class="absolute bottom-6 right-6 flex flex-col gap-2 z-20 nav-btn-group">
                <button id="zoomIn"><i data-lucide="plus"></i></button>
                <button id="zoomOut"><i data-lucide="minus"></i></button>
                <button id="resetView"><i data-lucide="maximize"></i></button>
            </div>

            <!-- Легенда (скрыта на маленьких экранах для экономии места) -->
            <div class="hidden md:block absolute top-6 left-6 bg-slate-900/80 backdrop-blur-md p-5 rounded-2xl border border-white/10 text-white space-y-3 shadow-2xl z-20 pointer-events-none">
                <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-[#f1c40f]">Легенда</h4>
                <div class="space-y-1.5">
                    <div class="flex items-center gap-2 text-[10px] font-medium"><div class="w-2 h-2 rounded-full bg-blue-500"></div><span>Силы правопорядка</span></div>
                    <div class="flex items-center gap-2 text-[10px] font-medium"><div class="w-2 h-2 rounded-full bg-red-500"></div><span>Зоны конфликта</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const maps = [
            { date: "1 марта 2024", image: "https://picsum.photos/seed/map1/2000/2000" },
            { date: "2 марта 2024", image: "https://picsum.photos/seed/map2/2000/2000" },
            { date: "3 марта 2024", image: "map3.png" }
        ];

        let currentIndex = maps.length - 1;
        let scale = 1;
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;

        const viewport = document.getElementById('mapViewport');
        const mapImg = document.getElementById('mapImage');
        const dateEl = document.getElementById('currentDate');

        function updateTransform() {
            mapImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function loadMap() {
            mapImg.src = maps[currentIndex].image;
            dateEl.textContent = maps[currentIndex].date;
        }

        // --- МЫШКА ---
        viewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            viewport.style.cursor = 'grabbing';
        });

        // --- ТАЧСКРИН (ТЕЛЕФОНЫ) ---
        viewport.addEventListener('touchstart', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            startX = touch.clientX - translateX;
            startY = touch.clientY - translateY;
            // Не даем странице скроллиться, когда двигаем карту
            if(e.cancelable) e.preventDefault();
        }, { passive: false });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            translateX = touch.clientX - startX;
            translateY = touch.clientY - startY;
            updateTransform();
            if(e.cancelable) e.preventDefault();
        }, { passive: false });

        window.addEventListener('mouseup', () => { isDragging = false; viewport.style.cursor = 'grab'; });
        window.addEventListener('touchend', () => { isDragging = false; });

        // --- КНОПКИ НАВИГАЦИИ ---
        const moveStep = 100;
        document.getElementById('moveUp').onclick = () => { translateY += moveStep; updateTransform(); };
        document.getElementById('moveDown').onclick = () => { translateY -= moveStep; updateTransform(); };
        document.getElementById('moveLeft').onclick = () => { translateX += moveStep; updateTransform(); };
        document.getElementById('moveRight').onclick = () => { translateX -= moveStep; updateTransform(); };

        // Зум
        document.getElementById('zoomIn').onclick = () => { scale += 0.2; updateTransform(); };
        document.getElementById('zoomOut').onclick = () => { scale = Math.max(0.1, scale - 0.2); updateTransform(); };
        document.getElementById('resetView').onclick = () => { scale = 1; translateX = 0; translateY = 0; updateTransform(); };

        // Даты
        document.getElementById('prevBtn').onclick = () => { if (currentIndex > 0) { currentIndex--; loadMap(); } };
        document.getElementById('nextBtn').onclick = () => { if (currentIndex < maps.length - 1) { currentIndex++; loadMap(); } };

        loadMap();
        updateTransform();
    </script>
</body>
</html>
