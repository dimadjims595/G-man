<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта боевых действий | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; touch-action: none; overflow: hidden; }
        
        .map-viewport { 
            cursor: grab; 
            overflow: hidden; 
            position: relative; 
            background: #020617; 
            touch-action: none; 
        }
        .map-viewport:active { cursor: grabbing; }
        
        #mapImage { 
            position: absolute;
            user-select: none;
            -webkit-user-drag: none;
            transform-origin: 0 0;
            will-change: transform;
            /* Убираем transition для мгновенного отклика при pinch-zoom */
            transition: transform 0.05s linear;
        }

        .control-btn {
            @apply w-12 h-12 bg-[#002868] border-2 border-[#f1c40f] rounded-xl shadow-[0_0_15px_rgba(0,0,0,0.5)] 
                   flex items-center justify-center text-[#f1c40f] active:scale-90 transition-all z-30;
        }
        .control-btn i { @apply w-6 h-6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="shield" class="text-[#f1c40f]"></i>
                <span class="font-black text-xl uppercase tracking-tighter">State Portal</span>
            </div>
            <div class="hidden lg:flex items-center space-x-2">
                <a href="index.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Главная</a>
                <a href="news.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Новости</a>
                <a href="registration.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Регистрация</a>
                <a href="citizens.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Граждане</a>
                <a href="business.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Бизнесы</a>
                <a href="map.html" class="bg-white/10 text-[#f1c40f] px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Карта</a>
                <a href="donate.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Пожертвования</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-4 flex-grow w-full space-y-4">
        <div class="flex flex-col md:flex-row justify-between items-end gap-2">
            <div>
                <h2 class="text-2xl font-black text-[#002868] uppercase tracking-tighter">Карта боевых действий</h2>
                <p class="text-slate-500 text-[10px]">Масштабируйте двумя пальцами или кнопками</p>
            </div>
            <div class="flex items-center gap-2 bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                <button id="prevBtn" class="p-1.5 hover:bg-slate-100 rounded-lg transition-colors"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                <div id="currentDate" class="text-[9px] font-black text-[#002868] uppercase tracking-widest min-w-[100px] text-center">Загрузка...</div>
                <button id="nextBtn" class="p-1.5 hover:bg-slate-100 rounded-lg transition-colors"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            </div>
        </div>

        <div class="relative rounded-[2rem] shadow-2xl border-4 border-[#002868] h-[550px] md:h-[700px] map-viewport" id="mapViewport">
            <img id="mapImage" src="" referrerpolicy="no-referrer" alt="Карта">
            
            <div class="absolute bottom-6 left-6 flex flex-col items-center gap-2 z-30">
                <button id="moveUp" class="control-btn"><i data-lucide="chevron-up"></i></button>
                <div class="flex gap-2">
                    <button id="moveLeft" class="control-btn"><i data-lucide="chevron-left"></i></button>
                    <button id="moveDown" class="control-btn"><i data-lucide="chevron-down"></i></button>
                    <button id="moveRight" class="control-btn"><i data-lucide="chevron-right"></i></button>
                </div>
            </div>

            <div class="absolute bottom-6 right-6 flex flex-col gap-2 z-30">
                <button id="zoomIn" class="control-btn"><i data-lucide="plus"></i></button>
                <button id="zoomOut" class="control-btn"><i data-lucide="minus"></i></button>
                <button id="resetView" class="control-btn"><i data-lucide="maximize"></i></button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const maps = [
            { date: "1 марта 2024", image: "https://picsum.photos/seed/map1/2000/2000" },
            { date: "2 марта 2024", image: "https://picsum.photos/seed/map2/2000/2000" },
            { date: "3 марта 2024", image: "map3.png" }
        ];

        let currentIndex = maps.length - 1;
        let scale = 2; // Начальный зум 2x
        let translateX = 0;
        let translateY = 0;
        
        let isDragging = false;
        let startX, startY;
        let initialPinchDist = 0;
        let initialScale = 1;

        const viewport = document.getElementById('mapViewport');
        const mapImg = document.getElementById('mapImage');
        const dateEl = document.getElementById('currentDate');

        function updateTransform() {
            // Ограничение зума от 0.1 до 10
            scale = Math.min(Math.max(0.1, scale), 10);
            mapImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        // Функция для установки вида на левый нижний угол
        function setInitialView() {
            const vh = viewport.clientHeight;
            const imgSize = 2000; // Базовый размер картинки
            
            scale = 2; // Увеличиваем в 2 раза
            translateX = 0; // Левый край
            translateY = vh - (imgSize * scale); // Нижний край
            updateTransform();
        }

        function loadMap() {
            mapImg.src = maps[currentIndex].image;
            dateEl.textContent = maps[currentIndex].date;
        }

        // Расчет расстояния между двумя точками (для pinch-zoom)
        function getDist(touches) {
            return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
        }

        // --- TOUCH EVENTS ---
        viewport.addEventListener('touchstart', (e) => {
            if (e.target.closest('button')) return;
            
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - translateX;
                startY = e.touches[0].clientY - translateY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                initialPinchDist = getDist(e.touches);
                initialScale = scale;
            }
            if(e.cancelable) e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isDragging) {
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const currentDist = getDist(e.touches);
                const ratio = currentDist / initialPinchDist;
                scale = initialScale * ratio;
                updateTransform();
            }
            if(e.cancelable) e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchend', () => { isDragging = false; });

        // --- MOUSE EVENTS ---
        viewport.addEventListener('mousedown', (e) => {
            if (e.target.closest('button')) return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // --- КНОПКИ ---
        const moveStep = 200;
        document.getElementById('moveUp').onclick = (e) => { e.stopPropagation(); translateY += moveStep; updateTransform(); };
        document.getElementById('moveDown').onclick = (e) => { e.stopPropagation(); translateY -= moveStep; updateTransform(); };
        document.getElementById('moveLeft').onclick = (e) => { e.stopPropagation(); translateX += moveStep; updateTransform(); };
        document.getElementById('moveRight').onclick = (e) => { e.stopPropagation(); translateX -= moveStep; updateTransform(); };

        document.getElementById('zoomIn').onclick = (e) => { e.stopPropagation(); scale += 0.5; updateTransform(); };
        document.getElementById('zoomOut').onclick = (e) => { e.stopPropagation(); scale -= 0.5; updateTransform(); };
        document.getElementById('resetView').onclick = (e) => { e.stopPropagation(); setInitialView(); };

        document.getElementById('prevBtn').onclick = () => { if (currentIndex > 0) { currentIndex--; loadMap(); } };
        document.getElementById('nextBtn').onclick = () => { if (currentIndex < maps.length - 1) { currentIndex++; loadMap(); } };

        // Инициализация
        loadMap();
        // Ждем загрузки картинки, чтобы правильно рассчитать размеры для начального вида
        mapImg.onload = setInitialView;
    </script>
</body>
</html>
