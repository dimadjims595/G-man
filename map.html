<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта боевых действий | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .map-container { cursor: grab; }
        .map-container:active { cursor: grabbing; }
        #mapImage { transition: transform 0.1s ease-out; transform-origin: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="shield" class="text-[#f1c40f]"></i>
                <span class="font-black text-xl uppercase tracking-tighter">State Portal</span>
            </div>
            <div class="hidden lg:flex items-center space-x-2">
                <a href="index.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Главная</a>
                <a href="news.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Новости</a>
                <a href="registration.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Регистрация</a>
                <a href="citizens.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Граждане</a>
                <a href="business.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Бизнесы</a>
                <a href="map.html" class="bg-white/10 text-[#f1c40f] px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Карта</a>
                <a href="donate.html" class="hover:bg-white/5 px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Пожертвования</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12 flex-grow w-full space-y-8">
        <div class="border-b border-slate-200 pb-6 flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <h2 class="text-4xl font-black text-[#002868] uppercase tracking-tighter">Карта боевых действий</h2>
                <p class="text-slate-500 mt-2">Оперативная обстановка и контроль территорий в реальном времени.</p>
            </div>
            <div class="flex items-center gap-4 bg-white p-2 rounded-2xl border border-slate-200 shadow-sm">
                <button id="prevBtn" class="p-2 hover:bg-slate-100 rounded-xl transition-colors"><i data-lucide="chevron-left"></i></button>
                <div id="currentDate" class="text-sm font-bold text-[#002868] uppercase tracking-widest min-w-[150px] text-center">3 марта 2024</div>
                <button id="nextBtn" class="p-2 hover:bg-slate-100 rounded-xl transition-colors"><i data-lucide="chevron-right"></i></button>
            </div>
        </div>

        <div class="relative bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-white h-[700px] map-container" id="mapViewport">
            <img id="mapImage" src="https://picsum.photos/seed/map3/2000/2000" class="absolute pointer-events-none select-none" style="width: 2000px; height: 2000px; top: -500px; left: -500px;">
            
            <!-- Управление зумом -->
            <div class="absolute bottom-8 right-8 flex flex-col gap-3">
                <button id="zoomIn" class="w-12 h-12 bg-white rounded-2xl shadow-xl flex items-center justify-center hover:bg-[#f1c40f] transition-colors"><i data-lucide="plus"></i></button>
                <button id="zoomOut" class="w-12 h-12 bg-white rounded-2xl shadow-xl flex items-center justify-center hover:bg-[#f1c40f] transition-colors"><i data-lucide="minus"></i></button>
                <button id="resetView" class="w-12 h-12 bg-white rounded-2xl shadow-xl flex items-center justify-center hover:bg-[#f1c40f] transition-colors"><i data-lucide="maximize"></i></button>
            </div>

            <!-- Легенда -->
            <div class="absolute top-8 left-8 bg-slate-900/80 backdrop-blur-md p-6 rounded-3xl border border-white/10 text-white space-y-4 shadow-2xl">
                <h4 class="text-xs font-black uppercase tracking-[0.2em] text-[#f1c40f]">Легенда карты</h4>
                <div class="space-y-2">
                    <div class="flex items-center gap-3 text-xs font-medium"><div class="w-3 h-3 rounded-full bg-blue-500"></div><span>Силы правопорядка</span></div>
                    <div class="flex items-center gap-3 text-xs font-medium"><div class="w-3 h-3 rounded-full bg-red-500"></div><span>Зоны конфликта</span></div>
                    <div class="flex items-center gap-3 text-xs font-medium"><div class="w-3 h-3 rounded-full bg-slate-500"></div><span>Нейтральные зоны</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const maps = [
            { date: "1 марта 2024", image: "https://picsum.photos/seed/map1/2000/2000" },
            { date: "2 марта 2024", image: "https://picsum.photos/seed/map2/2000/2000" },
            { date: "3 марта 2024", image: "https://picsum.photos/seed/map3/2000/2000" }
        ];

        let currentIndex = maps.length - 1;
        let scale = 1;
        let isDragging = false;
        let startX, startY, translateX = -500, translateY = -500;

        const viewport = document.getElementById('mapViewport');
        const mapImg = document.getElementById('mapImage');
        const dateEl = document.getElementById('currentDate');

        function updateTransform() {
            mapImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        viewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        document.getElementById('zoomIn').onclick = () => { scale += 0.2; updateTransform(); };
        document.getElementById('zoomOut').onclick = () => { scale = Math.max(0.5, scale - 0.2); updateTransform(); };
        document.getElementById('resetView').onclick = () => { scale = 1; translateX = -500; translateY = -500; updateTransform(); };

        document.getElementById('prevBtn').onclick = () => {
            if (currentIndex > 0) { currentIndex--; loadMap(); }
        };
        document.getElementById('nextBtn').onclick = () => {
            if (currentIndex < maps.length - 1) { currentIndex++; loadMap(); }
        };

        function loadMap() {
            mapImg.src = maps[currentIndex].image;
            dateEl.textContent = maps[currentIndex].date;
        }

        updateTransform();
    </script>
</body>
</html>
