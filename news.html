<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости штата | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <!-- Навигация -->
    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="shield" class="text-[#f1c40f] w-8 h-8"></i>
                <div class="flex flex-col">
                    <span class="font-black text-xl uppercase tracking-tighter leading-none">State Portal</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-[#f1c40f] font-bold">San Andreas Gov</span>
                </div>
            </div>
            <div class="hidden lg:flex items-center space-x-2">
                <a href="index.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Главная</a>
                <a href="news.html" class="bg-white/10 text-[#f1c40f] px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Новости</a>
                <a href="registration.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Регистрация</a>
                <a href="citizens.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Граждане</a>
                <a href="business.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Бизнесы</a>
                <a href="map.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all text-[#f1c40f]">Карта</a>
                <a href="donate.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Пожертвования</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12 w-full space-y-12">
        <div class="border-b border-slate-200 pb-8">
            <h2 class="text-4xl font-black text-[#002868] uppercase md:tracking-tighter tracking-tight">Новости штата</h2>
            <p class="text-slate-500 mt-2">Официальные сводки и важные объявления.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <!-- Список новостей -->
            <div id="newsContainer" class="lg:col-span-2 space-y-8">
                <div class="flex flex-col items-center justify-center py-20 gap-4">
                    <i data-lucide="loader-2" class="w-10 h-10 text-[#f1c40f] animate-spin"></i>
                    <span class="text-[#002868] font-black uppercase tracking-widest text-xs">Загрузка новостей...</span>
                </div>
            </div>

            <!-- Боковая панель -->
            <aside class="space-y-8">
                <div class="bg-[#002868] text-white p-8 rounded-[2.5rem] shadow-xl">
                    <h4 class="text-[#f1c40f] font-black uppercase tracking-widest text-xs mb-6">Категории</h4>
                    <ul id="categoryList" class="space-y-4">
                        <!-- Категории будут загружены через JS -->
                    </ul>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <h4 class="text-[#002868] font-black uppercase tracking-widest text-xs mb-6">Подписка</h4>
                    <p class="text-slate-500 text-xs mb-6">Получайте важные уведомления штата на почту.</p>
                    <input type="email" placeholder="Email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm mb-4 focus:outline-none focus:border-[#002868]">
                    <button class="w-full bg-[#002868] text-white py-3 rounded-xl font-black uppercase tracking-widest text-[10px] hover:bg-[#003a96] transition-colors">Подписаться</button>
                </div>
            </aside>
        </div>
    </main>

    <footer class="bg-slate-900 text-white py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-600 text-[10px] uppercase font-bold tracking-widest">© 2026 San Andreas Government. All rights reserved.</p>
        </div>
    </footer>

    <script>
        let newsData = [];
        const categoryColors = {
            'Указ': 'bg-blue-100 text-[#002868]',
            'Экономика': 'bg-emerald-100 text-emerald-700',
            'Безопасность': 'bg-red-100 text-red-700',
            'Общество': 'bg-amber-100 text-amber-700',
            'Другое': 'bg-slate-100 text-slate-700'
        };

        async function fetchNews() {
            const container = document.getElementById('newsContainer');
            try {
                const response = await fetch('news.json');
                const data = await response.json();
                newsData = Array.isArray(data) ? data : (data.news || []);
                renderNews();
                renderCategories();
            } catch (error) {
                container.innerHTML = '<p class="text-center py-20 text-slate-400">Ошибка загрузки новостей</p>';
            }
        }

        function renderCategories() {
            const categoryList = document.getElementById('categoryList');
            const counts = {};
            newsData.forEach(news => { counts[news.category] = (counts[news.category] || 0) + 1; });
            categoryList.innerHTML = Object.entries(counts).map(([cat, count]) => `
                <li class="flex justify-between items-center text-sm">
                    <span class="font-bold">${cat}</span>
                    <span class="bg-white/10 px-2 py-1 rounded-md text-[10px]">${count}</span>
                </li>
            `).join('');
        }

        function renderNews() {
            const container = document.getElementById('newsContainer');
            if (newsData.length === 0) {
                container.innerHTML = '<p class="text-center py-20 text-slate-400">Новостей пока нет</p>';
                return;
            }

            // Сортировка: закрепленные новости всегда вверху
            const sortedNews = [...newsData].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

            container.innerHTML = sortedNews.map(news => `
                <article class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border ${news.pinned ? 'border-amber-200' : 'border-slate-100'} group cursor-pointer hover:shadow-2xl transition-all relative" onclick="location.href='news-item.html?id=${news.id}'">
                    ${news.pinned ? `
                        <div class="absolute top-6 right-6 z-10 bg-amber-400 text-white p-2 rounded-full shadow-lg">
                            <i data-lucide="pin" class="w-4 h-4"></i>
                        </div>
                    ` : ''}
                    <div class="relative h-64 overflow-hidden">
                        <img src="${news.image}" alt="" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="p-8">
                        <div class="flex items-center gap-4 mb-4">
                            <span class="${categoryColors[news.category] || 'bg-slate-100'} text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full">${news.category}</span>
                            <span class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">${news.date}</span>
                        </div>
                        <h3 class="text-2xl font-black text-[#002868] uppercase md:tracking-tighter tracking-tight mb-4 leading-tight group-hover:text-blue-600 transition-colors">${news.title}</h3>
                        <p class="text-slate-600 leading-relaxed mb-6">${news.preview}</p>
                        <span class="text-[#002868] font-black uppercase tracking-widest text-[10px] flex items-center gap-2">Читать полностью <i data-lucide="arrow-right" class="w-4 h-4"></i></span>
                    </div>
                </article>
            `).join('');
            lucide.createIcons();
        }

        fetchNews();
    </script>
</body>
</html>
