backend:
  name: git-gateway
  branch: main

media_folder: "assets/news"
public_folder: "/assets/news"

collections:
  - name: "settings"
    label: "Контент"
    delete: false
    editor:
      preview: false
    files:
      - name: "news_list"
        label: "Список новостей"
        file: "news.json"
        allow_add: true
        fields:
          - name: "news"
            label: "Новости"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "number", default: 1 }
              - { label: "Заголовок", name: "title", widget: "string" }
              - { label: "Дата", name: "date", widget: "string", hint: "Например: 15 Марта 2024" }
              - label: "Категория"
                name: "category"
                widget: "select"
                options: ["Указ", "Экономика", "Безопасность", "Общество", "Другое"]
              - { label: "Изображение (URL)", name: "image", widget: "image" }
              - { label: "Краткое описание", name: "preview", widget: "text", hint: "Отображается в списке новостей" }
              - { label: "Полный текст (HTML)", name: "content", widget: "markdown", hint: "Можно использовать HTML теги <p>, <ul>, <li>" }
