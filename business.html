<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бизнесы | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <!-- Навигация -->
    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="shield" class="text-[#f1c40f]"></i>
                <span class="font-black text-xl uppercase tracking-tighter">State Portal</span>
            </div>
            <div class="hidden lg:flex items-center space-x-4">
                <a href="index.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest transition-all">Главная</a>
                <a href="news.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest transition-all">Новости</a>
                <a href="registration.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest transition-all">Регистрация ID</a>
                <a href="citizens.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest transition-all">Граждане</a>
                <a href="business.html" class="bg-white/10 text-[#f1c40f] px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest transition-all">Бизнесы</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12 flex-grow w-full space-y-8">
        <div class="border-b border-slate-200 pb-6">
            <h2 class="text-4xl font-black text-[#002868] uppercase tracking-tighter">Коммерческий реестр</h2>
            <p class="text-slate-500 mt-2">Предприятия, находящиеся под управлением граждан штата.</p>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Бизнес 1 -->
            <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-xl transition-all group">
                <div class="flex justify-between items-start mb-6">
                    <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center group-hover:bg-[#f1c40f] transition-colors">
                        <i data-lucide="wrench" class="text-white group-hover:text-[#002868] transition-colors w-5 h-5"></i>
                    </div>
                    <span class="text-[9px] font-black uppercase tracking-widest text-emerald-600 bg-emerald-50 px-2 py-1 rounded">Лицензия: OK</span>
                </div>
                <h3 class="text-xl font-black text-slate-900 mb-1 uppercase tracking-tight">Los Santos Customs</h3>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-6">Автосервис / Тюнинг</p>
                <div class="space-y-3 pt-6 border-t border-slate-50">
                    <div class="flex justify-between text-sm"><span class="text-slate-400">Владелец:</span><span class="font-bold">Michael Ross</span></div>
                    <div class="flex justify-between text-sm"><span class="text-slate-400">Налоги:</span><span class="text-emerald-500 font-bold">Оплачено</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
