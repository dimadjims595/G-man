<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реестр бизнесов | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <!-- Навигация -->
    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="shield" class="text-[#f1c40f] w-8 h-8"></i>
                <div class="flex flex-col">
                    <span class="font-black text-xl uppercase tracking-tighter leading-none">State Portal</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-[#f1c40f] font-bold">San Andreas Gov</span>
                </div>
            </div>
            <div class="hidden lg:flex items-center space-x-2">
                <a href="index.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Главная</a>
                <a href="news.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Новости</a>
                <a href="registration.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Регистрация</a>
                <a href="citizens.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Граждане</a>
                <a href="business.html" class="bg-white/10 text-[#f1c40f] px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Бизнесы</a>
                <a href="map.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all text-[#f1c40f]">Карта</a>
                <a href="donate.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Пожертвования</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12 w-full space-y-8">
        <div class="flex flex-col md:flex-row justify-between items-end gap-4 border-b border-slate-200 pb-8">
            <div>
                <h2 class="text-4xl font-black text-[#002868] uppercase tracking-tighter">Реестр бизнесов</h2>
                <p class="text-slate-500 mt-2">Список коммерческих предприятий штата.</p>
            </div>
            <div class="relative w-full md:w-72">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input type="text" placeholder="Поиск по названию..." class="w-full bg-white border border-slate-200 rounded-xl pl-12 pr-4 py-3 text-sm focus:outline-none focus:border-[#002868] shadow-sm">
            </div>
        </div>

        <div id="businessContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Данные будут загружены через JS -->
        </div>
    </main>

    <footer class="bg-slate-900 text-white py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-600 text-[10px] uppercase font-bold tracking-widest">© 2026 San Andreas Government. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function fetchBusinesses() {
            const container = document.getElementById('businessContainer');
            container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold uppercase tracking-widest text-[10px]">Загрузка реестра...</div>';

            try {
                const response = await fetch('business.json');
                const data = await response.json();
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold uppercase tracking-widest text-[10px]">Реестр пуст</div>';
                    return;
                }

                container.innerHTML = data.map(biz => `
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                        <div class="flex justify-between items-start mb-6">
                            <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                                <i data-lucide="${biz.icon || 'briefcase'}" class="text-[#002868]"></i>
                            </div>
                            <span class="${getStatusClass(biz.status)} text-[8px] font-black uppercase tracking-widest px-2 py-1 rounded-md">
                                ${biz.status}
                            </span>
                        </div>
                        <h3 class="text-xl font-black text-[#002868] uppercase tracking-tighter mb-1">${biz.name}</h3>
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-4">${biz.type}</p>
                        <div class="space-y-2 border-t border-slate-50 pt-4">
                            <div class="flex justify-between text-xs">
                                <span class="text-slate-400">Владелец:</span>
                                <span class="font-bold text-slate-700">${biz.owner}</span>
                            </div>
                            <div class="flex justify-between text-xs">
                                <span class="text-slate-400">Локация:</span>
                                <span class="font-bold text-slate-700">${biz.location}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="col-span-full py-20 text-center text-red-500 font-bold uppercase tracking-widest text-[10px]">Ошибка загрузки</div>';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'Налоги уплачены': return 'bg-emerald-100 text-emerald-700';
                case 'Задолженность': return 'bg-red-100 text-red-700';
                case 'На проверке': return 'bg-amber-100 text-amber-700';
                default: return 'bg-slate-100 text-slate-700';
            }
        }

        fetchBusinesses();
    </script>
</body>
</html>
