<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Новость | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .markdown-content p { margin-bottom: 1.5rem; line-height: 1.8; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <!-- Навигация -->
    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="shield" class="text-[#f1c40f] w-8 h-8"></i>
                <div class="flex flex-col">
                    <span class="font-black text-xl uppercase tracking-tight leading-none">State Portal</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-[#f1c40f] font-bold">San Andreas Gov</span>
                </div>
            </div>
            <div class="hidden lg:flex items-center space-x-2">
                <a href="index.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Главная</a>
                <a href="news.html" class="bg-white/10 text-[#f1c40f] px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Новости</a>
                <a href="registration.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Регистрация</a>
                <a href="citizens.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Граждане</a>
                <a href="business.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Бизнесы</a>
                <a href="map.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all text-[#f1c40f]">Карта</a>
                <a href="donate.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Пожертвования</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12 w-full">
        <a href="news.html" class="inline-flex items-center gap-2 text-[#002868] font-black uppercase tracking-widest text-[10px] mb-12 hover:gap-4 transition-all">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Назад к новостям
        </a>

        <div id="newsContent" class="space-y-8">
            <div class="flex flex-col items-center justify-center py-20 gap-4">
                <i data-lucide="loader-2" class="w-10 h-10 text-[#f1c40f] animate-spin"></i>
                <span class="text-[#002868] font-black uppercase tracking-widest text-xs">Загрузка...</span>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-white py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-600 text-[10px] uppercase font-bold tracking-widest">© 2026 San Andreas Government. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const categoryColors = {
            'Указ': 'bg-blue-100 text-[#002868]',
            'Экономика': 'bg-emerald-100 text-emerald-700',
            'Безопасность': 'bg-red-100 text-red-700',
            'Общество': 'bg-amber-100 text-amber-700',
            'Другое': 'bg-slate-100 text-slate-700'
        };

        async function loadNewsItem() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            const container = document.getElementById('newsContent');

            if (!id) {
                container.innerHTML = '<p class="text-center py-20">Новость не указана.</p>';
                return;
            }

            try {
                const response = await fetch('news.json');
                const data = await response.json();
                const newsList = Array.isArray(data) ? data : (data.news || []);
                const news = newsList.find(n => n.id === id);

                if (!news) {
                    container.innerHTML = '<p class="text-center py-20">Новость не найдена.</p>';
                    return;
                }

                document.getElementById('pageTitle').textContent = `${news.title} | San Andreas Gov`;
                const catClass = categoryColors[news.category] || 'bg-slate-100 text-slate-700';
                const imageUrl = news.image || 'https://picsum.photos/seed/state/800/600';

                container.innerHTML = `
                    <div class="animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <div class="relative h-[300px] md:h-[450px] rounded-[2.5rem] overflow-hidden shadow-2xl mb-10">
                            <img src="${imageUrl}" alt="${news.title}" class="w-full h-full object-cover">
                        </div>
                        
                        <div class="space-y-6">
                            <div class="flex items-center gap-4">
                                <span class="${catClass} text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full">${news.category}</span>
                                <span class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">${news.date}</span>
                            </div>
                            
                            <h1 class="text-3xl md:text-6xl font-black text-[#002868] uppercase tracking-tight leading-tight">
                                ${news.title}
                            </h1>
                            
                            <div class="markdown-content text-slate-600 text-lg md:text-xl leading-relaxed pt-6 border-t border-slate-100">
                                ${news.content}
                            </div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<p class="text-center py-20 text-red-500">Ошибка загрузки.</p>';
            }
        }

        loadNewsItem();
    </script>
</body>
</html>
