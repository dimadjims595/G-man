<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новость | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; color: #475569; }
        .prose h3 { font-weight: 900; text-transform: uppercase; color: #002868; margin-top: 2rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <a href="news.html" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest hover:text-[#f1c40f] transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Назад к новостям
            </a>
        </div>
    </nav>

    <main id="newsItemContent" class="max-w-4xl mx-auto px-4 py-12 w-full">
        <!-- Контент новости загружается здесь -->
    </main>

    <footer class="bg-slate-900 text-white py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-600 text-[10px] uppercase font-bold tracking-widest">© 2026 San Andreas Government. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function loadNewsItem() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const container = document.getElementById('newsItemContent');

            try {
                const response = await fetch('news.json');
                const newsList = await response.json();
                const news = newsList.find(item => item.id == id);

                if (!news) {
                    container.innerHTML = '<div class="text-center py-20"><h2 class="text-2xl font-black uppercase">Новость не найдена</h2><a href="news.html" class="text-blue-600 underline mt-4 block">Вернуться к списку</a></div>';
                    return;
                }

                container.innerHTML = `
                    <div class="space-y-8">
                        <div class="space-y-4">
                            <span class="bg-blue-100 text-[#002868] text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full">${news.category}</span>
                            <h1 class="text-4xl md:text-5xl font-black text-[#002868] uppercase md:tracking-tighter tracking-tight leading-none">${news.title}</h1>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">${news.date}</p>
                        </div>
                        <img src="${news.image}" class="w-full h-[400px] object-cover rounded-[2.5rem] shadow-2xl">
                        <div class="prose max-w-none text-lg">
                            ${news.content}
                        </div>
                    </div>
                `;
                lucide.createIcons();
            } catch (error) {
                container.innerHTML = '<p class="text-center py-20">Ошибка загрузки новости</p>';
            }
        }

        loadNewsItem();
    </script>
</body>
</html>
