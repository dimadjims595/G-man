<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реестр граждан | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <!-- Навигация -->
    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="shield" class="text-[#f1c40f] w-8 h-8"></i>
                <div class="flex flex-col">
                    <span class="font-black text-xl uppercase tracking-tighter leading-none">State Portal</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-[#f1c40f] font-bold">San Andreas Gov</span>
                </div>
            </div>
            <div class="hidden lg:flex items-center space-x-2">
                <a href="index.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Главная</a>
                <a href="news.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Новости</a>
                <a href="registration.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Регистрация</a>
                <a href="citizens.html" class="bg-white/10 text-[#f1c40f] px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Граждане</a>
                <a href="business.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Бизнесы</a>
                <a href="map.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all text-[#f1c40f]">Карта</a>
                <a href="donate.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all">Пожертвования</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12 w-full space-y-8">
        <div class="flex flex-col md:flex-row justify-between items-end gap-4 border-b border-slate-200 pb-8">
            <div>
                <h2 class="text-2xl md:text-4xl font-black text-[#002868] uppercase tracking-tighter">Реестр граждан</h2>
                <p class="text-slate-500 mt-2">Список официально зарегистрированных жителей штата.</p>
            </div>
            <!-- Поле поиска -->
            <div class="relative w-full md:w-80">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input type="text" id="searchInput" placeholder="Поиск по имени или ID..." class="w-full bg-white border border-slate-200 rounded-xl pl-12 pr-4 py-3 text-sm focus:outline-none focus:border-[#002868] shadow-sm transition-all">
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100">
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">ID</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">Имя Фамилия</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">Профессия</th>
                            <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">Статус</th>
                        </tr>
                    </thead>
                    <tbody id="citizensContainer" class="divide-y divide-slate-50">
                        <!-- Данные будут загружены через JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-white py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-600 text-[10px] uppercase font-bold tracking-widest">© 2026 San Andreas Government. All rights reserved.</p>
        </div>
    </footer>

    <script>
        let allCitizens = []; // Хранилище для всех данных

        async function fetchCitizens() {
            const container = document.getElementById('citizensContainer');
            container.innerHTML = '<tr><td colspan="4" class="px-8 py-20 text-center text-slate-400 font-bold uppercase tracking-widest text-[10px]">Загрузка реестра...</td></tr>';

            try {
                const response = await fetch('citizens.json');
                const data = await response.json();
                allCitizens = Array.isArray(data) ? data : [];
                renderCitizens(allCitizens);
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<tr><td colspan="4" class="px-8 py-20 text-center text-red-500 font-bold uppercase tracking-widest text-[10px]">Ошибка загрузки данных</td></tr>';
            }
        }

        function renderCitizens(citizens) {
            const container = document.getElementById('citizensContainer');
            
            if (citizens.length === 0) {
                container.innerHTML = '<tr><td colspan="4" class="px-8 py-20 text-center text-slate-400 font-bold uppercase tracking-widest text-[10px]">Граждане не найдены</td></tr>';
                return;
            }

            container.innerHTML = citizens.map(citizen => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-8 py-6 font-mono text-xs text-[#002868] font-bold">#${citizen.id}</td>
                    <td class="px-8 py-6 font-bold text-slate-700">${citizen.name}</td>
                    <td class="px-8 py-6 text-sm text-slate-500">${citizen.job || '—'}</td>
                    <td class="px-8 py-6">
                        <span class="${getStatusClass(citizen.status)} text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full">
                            ${citizen.status || 'Неизвестно'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            switch(status) {
                case 'Активен': return 'bg-emerald-100 text-emerald-700';
                case 'На проверке': return 'bg-amber-100 text-amber-700';
                case 'Заблокирован': return 'bg-red-100 text-red-700';
                default: return 'bg-slate-100 text-slate-700';
            }
        }

        // Логика поиска
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allCitizens.filter(citizen => {
                const nameMatch = citizen.name.toLowerCase().includes(term);
                const idMatch = citizen.id.toString().includes(term);
                return nameMatch || idMatch;
            });
            renderCitizens(filtered);
        });

        fetchCitizens();
        lucide.createIcons();
    </script>
</body>
</html>
