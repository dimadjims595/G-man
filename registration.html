<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация ID | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <!-- Навигация (такая же как на главной) -->
    <nav class="bg-[#002868] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="shield" class="text-[#f1c40f]"></i>
                <span class="font-black text-xl uppercase tracking-tighter">State Portal</span>
            </div>
            <div class="hidden lg:flex items-center space-x-4">
                <a href="index.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest">Главная</a>
                <a href="news.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest">Новости</a>
                <a href="registration.html" class="bg-white/10 text-[#f1c40f] px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest">Регистрация ID</a>
                <a href="citizens.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest">Граждане</a>
                <a href="business.html" class="hover:bg-white/5 px-4 py-2 rounded-md text-xs font-bold uppercase tracking-widest">Бизнесы</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12 flex-grow w-full">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
            <div class="bg-[#002868] p-6 text-white flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i data-lucide="file-signature" class="text-[#f1c40f]"></i>
                    <span class="font-bold uppercase tracking-widest text-sm">Подача заявления на ID-карту</span>
                </div>
            </div>
            <div class="p-10">
                <div class="mb-10 text-center">
                    <h3 class="text-3xl font-black text-slate-900 mb-4 uppercase tracking-tighter">Анкета гражданина</h3>
                    <p class="text-slate-500">Заполните форму ниже. Ваша заявка будет рассмотрена Департаментом Юстиции в течение 24 часов.</p>
                </div>
                
                <!-- ВСТАВЬТЕ ССЫЛКУ НА ВАШУ GOOGLE FORM НИЖЕ -->
                <div class="bg-slate-50 rounded-3xl p-4 border-2 border-dashed border-slate-200">
                    <iframe src="https://docs.google.com/forms/d/e/ВАШ_ID_ФОРМЫ/viewform?embedded=true" width="100%" height="1000" frameborder="0" marginheight="0" marginwidth="0">Загрузка…</iframe>
                </div>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
