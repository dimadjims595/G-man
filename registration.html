<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация ID | San Andreas Gov</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">
    <!-- Навигация -->

    <main class="max-w-5xl mx-auto px-4 py-12 w-full space-y-12">
        <div class="text-center space-y-4">
            <h2 class="text-4xl font-black text-[#002868] uppercase tracking-tighter">Заявление на получение ID</h2>
            <p class="text-slate-500 max-w-2xl mx-auto">Заполните форму ниже для регистрации в государственном реестре граждан штата San Andreas.</p>
        </div>

        <!-- Контейнер формы -->
        <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100 min-h-[800px] relative group">
            <!-- Декоративная рамка -->
            <div class="absolute inset-0 border-2 border-transparent group-hover:border-[#f1c40f]/20 rounded-[3rem] pointer-events-none transition-colors duration-500"></div>
            
            <iframe 
                src="https://docs.google.com/forms/d/e/ВАШ_ID_ФОРМЫ/viewform?embedded=true" 
                width="100%" 
                height="800" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0"
                class="relative z-10">
                Загрузка…
            </iframe>
            
            <div class="absolute inset-0 flex items-center justify-center bg-slate-50">
                <div class="text-center p-12">
                    <div class="w-20 h-20 bg-white rounded-3xl shadow-lg flex items-center justify-center mx-auto mb-8 animate-pulse">
                        <i data-lucide="form-input" class="w-10 h-10 text-[#f1c40f]"></i>
                    </div>
                    <p class="text-slate-400 font-black uppercase tracking-[0.3em] text-[10px]">Инициализация защищенного соединения...</p>
                </div>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
